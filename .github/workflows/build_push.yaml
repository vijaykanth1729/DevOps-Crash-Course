name: Used to Build and Push Docker Image to Docker Hub
on:
    workflow_dispatch:
jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
        - name: Checkout code
          uses: actions/checkout@v2
        
        - name: Login to Docker Hub
          uses: docker/login-action@v1
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        - name: Build and Push Docker Image
          uses: docker/build-push-action@v2
          with:
            context: .
            push: true
            tags: iamvijay/myapp3:latest
        - name: Logout from Docker Hub
          run: docker logout
        - name: Verify Docker Image
          run: docker pull iamvijay/myapp3:latest
        - name: Test Application (stdout)
          run: docker run --rm iamvijay/myapp3:latest | grep -Fq "hello world"
        
        
